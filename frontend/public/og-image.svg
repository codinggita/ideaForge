<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">IdeaForge MERN SaaS Project Workspace</title>
  <desc id="desc">Social preview image for IdeaForge, a MERN SaaS project and team productivity workspace.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#082f2f"/>
      <stop offset="0.55" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#042f2e" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1010" cy="105" r="190" fill="#ccfbf1" opacity="0.18"/>
  <circle cx="165" cy="530" r="220" fill="#fffbeb" opacity="0.16"/>
  <g filter="url(#shadow)">
    <rect x="620" y="115" width="430" height="330" rx="32" fill="#f8fafc" opacity="0.96"/>
    <rect x="660" y="160" width="150" height="76" rx="18" fill="#0f766e"/>
    <rect x="835" y="160" width="170" height="76" rx="18" fill="#f59e0b"/>
    <rect x="660" y="266" width="345" height="24" rx="12" fill="#cbd5e1"/>
    <rect x="660" y="312" width="285" height="24" rx="12" fill="#cbd5e1"/>
    <rect x="660" y="358" width="315" height="24" rx="12" fill="#cbd5e1"/>
  </g>
  <text x="110" y="230" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="88" font-weight="800">IdeaForge</text>
  <text x="116" y="305" fill="#ecfeff" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">MERN SaaS Project Workspace</text>
  <text x="116" y="370" fill="#fef3c7" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600">Projects • Tasks • Teams • Meetings • Reports</text>
  <text x="116" y="428" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600">React + Node + Express + MongoDB</text>
